# TMaaS Marketplace — local Supabase config
# See https://supabase.com/docs/guides/cli/config

project_id = "tmaas-marketplace"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"

[auth.email]
enable_signup = true
