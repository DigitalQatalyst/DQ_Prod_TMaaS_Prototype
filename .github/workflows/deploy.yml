name: Deploy to Production

# Triggers when main in the build repo is updated via PR merge.
# Pushes main to the deploy repo (DQ-Superuser/DQ-TMaaS), which Vercel watches.
#
# INACTIVE until:
#   1. Deploy repo DQ-Superuser/DQ-TMaaS is created
#   2. SSH deploy key is generated and added:
#      - Public key → DQ-Superuser/DQ-TMaaS Deploy Keys (write access)
#      - Private key → DigitalQatalyst/DQ_Prod_TMaaS_Prototype Secret: DEPLOY_REPO_SSH_KEY
#
# See scratch/DQ_TMAAS_WORKFLOW_SETUP.md §7 for full setup instructions.

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Push to deploy repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_REPO_SSH_KEY }}

      - name: Add deploy remote
        run: |
          git remote add deploy git@github.com:DQ-Superuser/DQ-TMaaS.git

      - name: Push to deploy repo
        run: |
          git -c user.email="superuser@digitalqatalyst.com" \
              -c user.name="Sharavi" \
              commit --allow-empty -m "ci: deploy to production"
          git push deploy main:main --force
